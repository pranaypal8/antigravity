<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Customers — Special One Admin</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div id="cursor-dot"></div><div id="cursor-ring"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-logo"><div class="sidebar-logo__text">SPECIAL <span>ONE</span></div><span class="sidebar-logo__badge">Admin Panel</span></div>
    <div class="sidebar-user"><div class="sidebar-user__avatar" id="sidebarInitial">?</div><div><div class="sidebar-user__name" id="sidebarName">Loading...</div><div class="sidebar-user__role" id="sidebarRole">—</div></div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav__section-label">Operations</div>
      <a href="dashboard.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">📊</span> Dashboard</a>
      <a href="orders.html"    class="sidebar-nav__item"><span class="sidebar-nav__icon">📦</span> Orders</a>
      <a href="customers.html" class="sidebar-nav__item active"><span class="sidebar-nav__icon">👤</span> Customers</a>
      <a href="support.html"   class="sidebar-nav__item"><span class="sidebar-nav__icon">🎫</span> Support</a>
      <div class="sidebar-nav__section-label">Inventory</div>
      <a href="products.html"  class="sidebar-nav__item"><span class="sidebar-nav__icon">👔</span> Products</a>
      <a href="fabrics.html"   class="sidebar-nav__item"><span class="sidebar-nav__icon">🧵</span> Fabrics</a>
      <div class="sidebar-nav__section-label">Finance</div>
      <a href="analytics.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">📈</span> Analytics</a>
      <div class="sidebar-nav__section-label" id="superAdminSection" style="display:none">System</div>
      <a href="admins.html"    class="sidebar-nav__item" id="nav-admins" style="display:none"><span class="sidebar-nav__icon">🔐</span> Admins</a>
      <a href="audit.html"     class="sidebar-nav__item" id="nav-audit"  style="display:none"><span class="sidebar-nav__icon">📋</span> Audit</a>
    </nav>
    <div class="sidebar-footer"><button class="sidebar-nav__item" id="logoutBtn" style="width:100%"><span class="sidebar-nav__icon">🚪</span> Logout</button></div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <button class="admin-menu-btn" id="adminMenuBtn" aria-label="Toggle navigation" aria-expanded="false"><span></span><span></span><span></span></button>
      <div class="admin-topbar__title">Customers</div>
      <div class="admin-topbar__actions">
        <input type="text" id="customerSearch" class="admin-search-input" placeholder="Search name, email, phone..." aria-label="Search customers">
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-table-wrapper">
        <div class="admin-table-header">
          <div class="admin-table-title">All Customers</div>
          <span class="pagination__info" id="customerCount">Loading...</span>
        </div>
        <div style="overflow-x:auto">
          <table aria-label="Customers table">
            <thead>
              <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Total Spent</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
            </thead>
            <tbody id="customersTableBody">
              <tr><td colspan="9" style="text-align:center;padding:3rem;color:var(--text-muted);font-family:var(--font-accent);font-size:0.75rem">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span class="pagination__info" id="paginationInfo">—</span>
          <div class="pagination__btns" id="paginationBtns"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Customer Detail Modal -->
<div class="modal-overlay" id="customerModal" role="dialog" aria-label="Customer details">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <div class="modal-title" id="customerModalTitle">Customer Details</div>
      <button class="modal-close" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="customerModalBody">Loading...</div>
  </div>
</div>

<script src="../js/global.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
